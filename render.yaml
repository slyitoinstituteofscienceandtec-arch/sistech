services:
  - type: web
    name: sistech
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate --force
      php artisan migrate --force
      php artisan db:seed --force
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: sistech-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sistech-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: sistech-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: sistech-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sistech-db
          property: password

databases:
  - name: sistech-db
    plan: free
    databaseName: sistech_cms
